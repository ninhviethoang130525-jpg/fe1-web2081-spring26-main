<h2>Đăng ký tài khoản</h2>

<form [formGroup]="registerForm" (ngSubmit)="submitForm()">
  <!-- Username Field -->
  <div>
    <label for="username">Tên đăng nhập:</label>
    <input
      id="username"
      type="text"
      formControlName="username"
      placeholder="Nhập tên đăng nhập" />
    <div *ngIf="username?.invalid && username?.touched" class="error-message">
      <p *ngIf="username?.errors?.['required']">Tên đăng nhập là bắt buộc</p>
    </div>
  </div>

  <!-- Email Field -->
  <div>
    <label for="email">Email:</label>
    <input
      id="email"
      type="email"
      formControlName="email"
      placeholder="Nhập email" />
    <div *ngIf="email?.invalid && email?.touched" class="error-message">
      <p *ngIf="email?.errors?.['required']">Email là bắt buộc</p>
      <p *ngIf="email?.errors?.['email']">Email không hợp lệ</p>
    </div>
  </div>

  <!-- Password Field -->
  <div>
    <label for="password">Mật khẩu:</label>
    <input
      id="password"
      type="password"
      formControlName="password"
      placeholder="Nhập mật khẩu" />
    <div *ngIf="password?.invalid && password?.touched" class="error-message">
      <p *ngIf="password?.errors?.['required']">Mật khẩu là bắt buộc</p>
      <p *ngIf="password?.errors?.['minlength']">Mật khẩu phải có ít nhất 6 ký tự</p>
    </div>
  </div>

  <button type="submit" [disabled]="registerForm.invalid">Đăng ký</button>
</form>

<div class="login-link">
  <p>Đã có tài khoản? <a routerLink="/login">Đăng nhập tại đây</a></p>
</div>
