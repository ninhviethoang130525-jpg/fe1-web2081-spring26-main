<h2>Đăng nhập</h2>

<form [formGroup]="loginForm" (ngSubmit)="submitForm()">
  <!-- Username Field -->
  <div>
    <label for="username">Tên đăng nhập:</label>
    <input
      id="username"
      type="text"
      formControlName="username"
      placeholder="Nhập tên đăng nhập hoặc email" />
    <div *ngIf="username?.invalid && username?.touched" class="error-message">
      <p *ngIf="username?.errors?.['required']">Tên đăng nhập là bắt buộc</p>
    </div>
  </div>

  <!-- Password Field -->
  <div>
    <label for="password">Mật khẩu:</label>
    <input
      id="password"
      type="password"
      formControlName="password"
      placeholder="Nhập mật khẩu" />
    <div *ngIf="password?.invalid && password?.touched" class="error-message">
      <p *ngIf="password?.errors?.['required']">Mật khẩu là bắt buộc</p>
      <p *ngIf="password?.errors?.['minlength']">Mật khẩu phải có ít nhất 6 ký tự</p>
    </div>
  </div>

  <button type="submit" [disabled]="loginForm.invalid">Đăng nhập</button>
</form>

<div class="register-link">
  <p>Chưa có tài khoản? <a routerLink="/register">Đăng ký tại đây</a></p>
</div>
